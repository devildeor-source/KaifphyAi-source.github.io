<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaifphy AI</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .ai-response { background: #111; border: 1px solid #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); align-self: flex-start; }
        .input-area { padding: 20px; background: #000; display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; background: #111; border: 1px solid #00f2ff; border-radius: 25px; padding: 12px 20px; color: #fff; outline: none; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .upload-btn { background: #00f2ff; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="bubble ai-response">Hello! Upload a Physics PDF to start.</div>
</div>

<div class="input-area">
    <input type="file" id="fileInput" style="display: none;" accept=".pdf" onchange="handleUpload()">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="text" class="input-box" placeholder="Relativity..." id="userInput">
</div>

<script>
    async function handleUpload() {
        const fileInput = document.getElementById('fileInput');
        const container = document.getElementById('chat-container');
        
        if (!fileInput.files[0]) return;

        // Show "Thinking" bubble
        const loadingBubble = document.createElement('div');
        loadingBubble.className = 'bubble ai-response';
        loadingBubble.innerText = "Analyzing PDF...";
        container.appendChild(loadingBubble);

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const result = await response.json();

            if (response.ok) {
                loadingBubble.innerText = result.text.substring(0, 1000) + "..."; // Show first 1000 chars
            } else {
                loadingBubble.innerText = "Error reading file.";
            }
        } catch (err) {
            loadingBubble.innerText = "Connection failed.";
        }
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
